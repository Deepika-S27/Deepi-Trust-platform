<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Deepi Trust & Donations - AI-powered food donation, real-time delivery tracking, and crowdfunding platform. Bridging excess food and hungry hearts." />
    <meta name="keywords" content="food donation, charity, trust, crowdfunding, AI quality check, delivery tracking, Chennai" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Deepi Trust & Donations — No Food Should Go To Waste</title>
  </head>
  <body>
    <div id="root">
      <!-- Inline loading screen shown before React mounts -->
      <div id="app-loader" style="
        position:fixed;top:0;left:0;width:100%;height:100%;
        background:#fff;display:flex;flex-direction:column;
        align-items:center;justify-content:center;z-index:9999;
        font-family:'Inter',sans-serif;
      ">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="#2d6a4f">
            <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/>
          </svg>
          <span style="font-size:1.5rem;font-weight:800;color:#1a1a2e;">DEEPI<span style="color:#2d6a4f;"> TRUST</span></span>
        </div>
        <div style="
          width:40px;height:40px;border:4px solid #e0e0e0;
          border-top-color:#2d6a4f;border-radius:50%;
          animation:spin 0.8s linear infinite;
        "></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        <p style="color:#888;margin-top:16px;font-size:0.9rem;">Loading Deepi Trust...</p>
      </div>
    </div>
    <script>
      // Remove loader once React mounts
      window.__removeLoader = function() {
        var l = document.getElementById('app-loader');
        if (l) l.remove();
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
